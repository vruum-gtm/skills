name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify manifests are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.mcp.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('package.json','utf8'))"

      - name: Verify installer runs
        run: |
          node install.js help > /dev/null
          node install.js list > /dev/null

      - name: Verify npm pack succeeds and whitelist is correct
        run: |
          npm pack --dry-run 2>&1 | tee /tmp/pack-output.txt
          # Should include the 2 skills + installer + manifests + docs
          grep -q "install.js" /tmp/pack-output.txt
          grep -q "skills/enrich-prospect/SKILL.md" /tmp/pack-output.txt
          grep -q "skills/diagnose-reply/SKILL.md" /tmp/pack-output.txt
          grep -q ".mcp.json" /tmp/pack-output.txt
          grep -q "README.md" /tmp/pack-output.txt
          grep -q "LICENSE" /tmp/pack-output.txt

      - name: Leak audit — no maintainer local paths in skills
        run: |
          if grep -rE "Documents/GitHub|/improve|vruum-(market|offer|reachability|viability)-analyst" skills/; then
            echo "Leaked reference found" >&2
            exit 1
          fi
