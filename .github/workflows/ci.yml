name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify manifests are valid JSON
        run: |
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/plugin.json','utf8'))"

      - name: Verify marketplace references a resolvable plugin source
        run: |
          # The plugin now lives on npm. Confirm the source field points at a
          # real npm package and the package is resolvable.
          PKG=$(node -pe "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8')).plugins[0].source.package")
          echo "marketplace points at npm package: $PKG"
          npm view "$PKG" version
